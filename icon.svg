<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <style>
            /* Imports the same font used in the Web App */
            @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@700&amp;display=swap');
            
            .poke-text {
                font-family: 'Fredoka', 'Arial Rounded MT Bold', sans-serif;
                font-weight: 700;
                text-anchor: middle;
                stroke: #1A1A1A;
                stroke-width: 14px;
                stroke-linejoin: round;
                /* Draws the stroke behind the fill, giving that authentic thick logo outline */
                paint-order: stroke fill; 
            }
        </style>
    </defs>

    <rect width="512" height="512" fill="#3164B5"/>
    
    <circle cx="256" cy="256" r="210" fill="#E3350D" stroke="#FFCB05" stroke-width="20"/>
    
    <g class="poke-text">
        <text x="256" y="210" font-size="75" fill="#FFCB05">WHAT'S</text>
        <text x="256" y="290" font-size="75" fill="#FFCB05">THAT</text>
        <text x="256" y="375" font-size="90" fill="#FFFFFF">CARD?</text>
    </g>
</svg>
