<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's that Pokémon Card?</title>
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- POKÉMON COLOR THEME & VARIABLES --- */
        :root {
            --poke-red: #E3350D;
            --poke-blue: #3164B5;
            --poke-yellow: #FFCB05;
            --poke-yellow-dark: #C7A008;
            --poke-dark: #1A1A1A;
            --pos-x: 50%;
            --pos-y: 50%;
        }

        body {
            /* Nice radial gradient for the background */
            background: radial-gradient(circle at top center, #417BDB, var(--poke-blue));
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; 
        }

        /* --- APP BANNER --- */
        .app-banner {
            background-color: var(--poke-red);
            border: 4px solid var(--poke-yellow);
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 25px;
            width: 90%;
            max-width: 420px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 0 var(--poke-dark), 0 10px 20px rgba(0,0,0,0.4);
        }

        .app-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--poke-yellow);
            text-shadow: 2px 2px 0px var(--poke-dark), -1px -1px 0px var(--poke-dark), 1px -1px 0px var(--poke-dark), -1px 1px 0px var(--poke-dark);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            line-height: 1.1;
        }

        /* --- COGWHEEL ICON --- */
        .settings-icon {
            font-size: 1.8rem;
            cursor: pointer;
            color: white;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1;
            text-shadow: 2px 2px 0px var(--poke-dark);
        }
        .settings-icon:hover { transform: rotate(90deg) scale(1.1); color: var(--poke-yellow); }

        /* --- GAME BOARD --- */
        .game-board {
            background-color: var(--poke-blue);
            border: 5px solid var(--poke-yellow);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 420px;
            box-sizing: border-box;
            box-shadow: 0 8px 0 var(--poke-dark), 0 15px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* --- STATS PILLS --- */
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .stat-pill {
            background-color: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 30px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .stat-value {
            color: var(--poke-yellow);
            font-size: 1.3rem;
            text-shadow: 1px 1px 0px black;
        }

        /* --- THE FLASHLIGHT EFFECT --- */
        .card-wrapper {
            background-color: var(--poke-dark);
            width: 250px;
            height: 350px;
            margin: 0 auto 20px auto;
            border-radius: 12px;
            border: 4px solid white;
            box-shadow: inset 0 0 20px black, 0 5px 15px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .mystery-card {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px; /* Matches inner boundary */
            /* Transitions are handled dynamically in JS to prevent the flash! */
        }

        /* Dynamic Hint Classes */
        .hint-0 { clip-path: circle(8% at var(--pos-x) var(--pos-y)); filter: grayscale(100%); }
        .hint-1 { clip-path: circle(15% at var(--pos-x) var(--pos-y)); filter: grayscale(100%); }
        .hint-2 { clip-path: circle(25% at var(--pos-x) var(--pos-y)); filter: grayscale(100%); }
        .hint-3 { clip-path: circle(100% at 50% 50%); filter: grayscale(0%); }

        /* --- TACTILE BUTTONS --- */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        button {
            background-color: var(--poke-yellow);
            color: var(--poke-dark);
            border: 3px solid white;
            padding: 14px 10px;
            font-size: 0.95rem;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 5px 0 var(--poke-yellow-dark), 0 5px 5px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:active:not(:disabled) { 
            transform: translateY(5px); 
            box-shadow: 0 0px 0 var(--poke-yellow-dark), 0 0px 0px rgba(0,0,0,0);
        }
        
        button:hover:not(:disabled) { 
            background-color: #ffe04d; 
        }
        
        button:disabled { 
            background-color: #cccccc;
            border-color: #999;
            color: #666;
            box-shadow: 0 5px 0 #999;
            cursor: not-allowed; 
            transform: none;
        }
        
        .hint-btn {
            background-color: white;
            color: var(--poke-red);
            box-shadow: 0 5px 0 #cccccc, 0 5px 5px rgba(0,0,0,0.3);
            width: 100%;
        }
        
        .hint-btn:active:not(:disabled) {
            box-shadow: 0 0px 0 #cccccc;
        }

        /* --- BEAUTIFIED MODALS --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--poke-blue);
            border: 5px solid var(--poke-yellow);
            border-radius: 20px;
            width: 85%;
            max-width: 360px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 0 var(--poke-dark), 0 20px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            background-color: var(--poke-red);
            padding: 15px;
            border-bottom: 4px solid var(--poke-yellow);
        }

        .modal-header h2 { 
            margin: 0; 
            font-family: 'Fredoka', sans-serif;
            color: white; 
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px var(--poke-dark);
        }

        .modal-body {
            padding: 25px 20px;
            font-size: 1.1rem;
        }

        .modal-body p { margin: 0 0 20px 0; line-height: 1.5; }
        .modal-body b { color: var(--poke-yellow); font-size: 1.2rem; }
        .modal-body .btn-container { display: flex; flex-direction: column; gap: 12px; }

        /* Install app button specific styling */
        #installBtn { 
            display: none; 
            background-color: #4CAF50; 
            color: white; 
            border-color: white; 
            box-shadow: 0 5px 0 #2E7D32;
        }
        #installBtn:active:not(:disabled) { box-shadow: 0 0px 0 #2E7D32; }

    </style>
</head>
<body>

<div class="app-banner">
    <h1 class="app-title">What's that<br>Pokémon Card?</h1>
    <div class="settings-icon" onclick="openInfoModal()">⚙️</div>
</div>

<div class="game-board">
    <div class="stats">
        <div class="stat-pill">Score: <span class="stat-value" id="scoreEl">0</span></div>
        <div class="stat-pill">Time: <span class="stat-value" id="timeEl">15</span>s</div>
    </div>

    <div class="card-wrapper">
        <img id="cardImage" class="mystery-card" alt="Mystery Card" style="opacity: 0;">
    </div>

    <div class="options-grid" id="optionsContainer">
        <p style="grid-column: span 2; font-family: 'Fredoka', sans-serif; text-align: center;">Loading Cards...</p>
    </div>

    <button class="hint-btn" id="hintBtn" onclick="useHint()" disabled>Use Hint (Costs 25 Pts)</button>
</div>

<div class="modal-overlay" id="resultModal">
    <div class="modal-content">
        <div class="modal-header" id="resultHeader">
            <h2 id="resultTitle">Result</h2>
        </div>
        <div class="modal-body">
            <p id="resultMessage">Message goes here.</p>
            <div class="btn-container">
                <button onclick="closeResultAndNext()">Next Card</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="infoModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>How to Play</h2>
        </div>
        <div class="modal-body">
            <p>Guess the Pokémon card from the small art snippet!</p>
            <p style="font-size: 0.95rem; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px;">
                ✅ <b>Correct:</b> +100 Pts<br>
                ⏱️ <b>Time left:</b> +5 Pts/sec<br>
                🔍 <b>Hints:</b> -25 Pts each
            </p>
            <div class="btn-container">
                <button id="installBtn">📲 Install App</button>
                <button class="hint-btn" onclick="closeInfoModal()">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- PWA SETUP ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.error('SW Error', err));
        });
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('installBtn').style.display = 'none';
            }
            deferredPrompt = null;
        }
    });

    // --- GAME STATE ---
    let cardPool = [];
    let currentCard = null;
    let hintLevel = 0;
    let score = 0;
    let timeLeft = 15;
    let timerInterval;
    let isRoundActive = false;

    // --- DOM ELEMENTS ---
    const cardImage = document.getElementById('cardImage');
    const optionsContainer = document.getElementById('optionsContainer');
    const scoreEl = document.getElementById('scoreEl');
    const timeEl = document.getElementById('timeEl');
    const hintBtn = document.getElementById('hintBtn');
    
    const resultModal = document.getElementById('resultModal');
    const resultHeader = document.getElementById('resultHeader');
    const resultTitle = document.getElementById('resultTitle');
    const resultMessage = document.getElementById('resultMessage');
    const infoModal = document.getElementById('infoModal');

    // --- INITIALIZATION ---
    async function initGame() {
        const rawQuery = 'rarity:"Illustration Rare" OR rarity:"Special Illustration Rare" OR rarity:"Hyper Rare" OR rarity:"Rare Ultra"';
        const encodedQuery = encodeURIComponent(rawQuery);
        const randomPage = Math.floor(Math.random() * 3) + 1; 
        
        try {
            const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=${encodedQuery}&pageSize=50&page=${randomPage}`);
            if (!res.ok) throw new Error(`API error: ${res.status}`);

            const data = await res.json();
            cardPool = data.data.filter(card => card.images && card.images.large); 
            
            if(cardPool.length >= 4) {
                startRound();
            } else {
                throw new Error("Too few valid cards.");
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            optionsContainer.innerHTML = `<p style="grid-column: span 2; font-size: 0.9rem;"><b>Error:</b> ${error.message}<br><br>Please refresh or disable AdBlock.</p>`;
        }
    }

    // --- GAME LOGIC ---
    function startRound() {
        if (cardPool.length < 4) {
            initGame();
            return;
        }

        isRoundActive = true;
        hintLevel = 0;
        timeLeft = 15;
        
        // Pick random coords for flashlight
        const randX = Math.floor(Math.random() * 50) + 25;
        const randY = Math.floor(Math.random() * 50) + 25;
        document.documentElement.style.setProperty('--pos-x', `${randX}%`);
        document.documentElement.style.setProperty('--pos-y', `${randY}%`);

        updateUI();

        let shuffledPool = [...cardPool].sort(() => 0.5 - Math.random());
        let roundCards = shuffledPool.slice(0, 4);
        currentCard = roundCards[0];

        // HOW WE FIX THE FLASH: Hide the image, remove animations, set class, then fade in on load
        cardImage.style.opacity = 0;
        cardImage.style.transition = 'none';
        cardImage.className = 'mystery-card hint-0';
        
        cardImage.onload = () => {
            // Force browser to register the non-transitioned state
            void cardImage.offsetWidth;
            // Turn transitions back on and fade it in
            cardImage.style.transition = 'clip-path 0.5s ease, filter 0.5s ease, opacity 0.3s ease';
            cardImage.style.opacity = 1;
            
            hintBtn.disabled = false;
            hintBtn.innerText = "Use Hint (Costs 25 Pts)";
            
            // Render buttons only after image is loaded
            let options = [...roundCards].sort(() => 0.5 - Math.random());
            optionsContainer.innerHTML = '';
            options.forEach(optionCard => {
                const btn = document.createElement('button');
                btn.innerText = optionCard.name;
                btn.onclick = () => checkAnswer(optionCard.name);
                optionsContainer.appendChild(btn);
            });

            clearInterval(timerInterval);
            timerInterval = setInterval(handleTimer, 1000);
        };
        
        // This triggers the onload event above
        cardImage.src = currentCard.images.large;
    }

    function useHint() {
        if (hintLevel < 3 && isRoundActive) {
            hintLevel++;
            cardImage.className = `mystery-card hint-${hintLevel}`;
            if (hintLevel === 3) {
                hintBtn.disabled = true;
                hintBtn.innerText = "Max Hints Used";
            }
        }
    }

    function handleTimer() {
        timeLeft--;
        updateUI();
        if (timeLeft <= 0) {
            endRound(false, "Time's up!");
        }
    }

    function checkAnswer(selectedName) {
        if (!isRoundActive) return;
        if (selectedName === currentCard.name) {
            let pointsEarned = 100 + (timeLeft * 5) - (hintLevel * 25);
            pointsEarned = Math.max(10, pointsEarned); 
            score += pointsEarned;
            endRound(true, `You earned ${pointsEarned} points!`);
        } else {
            endRound(false, `Incorrect!`);
        }
    }

    function endRound(isWin, message) {
        isRoundActive = false;
        clearInterval(timerInterval);
        cardImage.className = 'mystery-card hint-3'; 
        
        const btns = optionsContainer.querySelectorAll('button');
        btns.forEach(btn => btn.disabled = true);
        hintBtn.disabled = true;

        updateUI();

        setTimeout(() => {
            resultTitle.innerText = isWin ? "Correct!" : "Game Over";
            resultHeader.style.backgroundColor = isWin ? "#4CAF50" : "var(--poke-red)";
            resultMessage.innerHTML = `${message}<br><br>The card was:<br><b>${currentCard.name}</b>`;
            resultModal.style.display = "flex";
        }, 1200);
    }

    function closeResultAndNext() {
        resultModal.style.display = "none";
        cardPool = cardPool.filter(c => c.id !== currentCard.id);
        
        // Show loading text while next image prepares
        optionsContainer.innerHTML = `<p style="grid-column: span 2; font-family: 'Fredoka', sans-serif; text-align: center;">Loading Next Card...</p>`;
        
        startRound();
    }

    function openInfoModal() { infoModal.style.display = "flex"; }
    function closeInfoModal() { infoModal.style.display = "none"; }

    function updateUI() {
        scoreEl.innerText = score;
        timeEl.innerText = timeLeft;
    }

    initGame();
</script>

</body>
</html>
